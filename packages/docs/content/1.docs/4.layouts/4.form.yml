title: Form
layout: form
action: /docs/layouts/form
method: GET
schema:
  name: # name attribute of form element
    label: Name # optional
    format: string # implicitly required (technically very few validations will work without it)
    matches: '[A-Za-z\s]+'
fullErrors: false
body:
  - h2: Arbitrary HTML
  - p:
      class: lead
      body: The forms schema accepts a subset of arbitrary HTML tags.
  - p: The above example is a p tag with a text body attribute and a class of lead.
  - p: 'The schema for that looks a little like this:'
  - pre: |
      body:
        - p:
          class: lead
          body: The forms schema accepts a subset of arbitrary HTML tags.
  - p: 'We can also render images:'
  - img:
      src: /uploads/tamanna-rumee-9ROY8fXmTto-unsplash.jpg
      class: m-auto
      height: 200
  - p: 'And custom TNT components like this card:'
  - card:
      class: success
      body:
        - strong:
            body: Card Title
        - p: Card body

  - h2: String Inputs

  - input:
      type: text
      name: name
      label: Name
      hint: You know this.
      placeholder: What do people call you?

  - input:
      type: text
      name: validations
      label: Validations
      hint: This field is required; it must be between 6 and 15 characters long and contain the word 'banana'.
      placeholder: I am a banana!
      rules:
        min: 6
        max: 15
        matches: '[Bb]anana'
        required: true

  - input:
      type: email
      name: email
      label: Email
      hint: How do we contact you?
      placeholder: john@example.com

  - input:
      type: url
      name: url
      label: URL
      hint: Got a website?
      placeholder: https://example.com

  - input:
      type: tel
      name: tel
      label: Telephone
      hint: What's your number?
      placeholder: '+44'

  - input:
      type: password
      name: password
      label: Password
      hint: Keep it secret.
      placeholder: correct horse battery staple
      rules:
        required: true
        min: 6

  - input:
      type: password
      name: password_confirmation
      label: Password confirmation
      hint: ...and remember it!
      placeholder: correct horse battery staple
      rules:
        required: true
        min: 6
        confirms: password

  - h2: Numeric Inputs

  # TODO: Problems with number and date fields. Once entered, if deleted, validation fails due to casting.
  #       Even if they are marked as strict, nullable or optional.

  - input:
      type: number
      name: number
      label: Number
      hint: Pick a number. Any number.
      placeholder: '42'
      rules:
        min: 13
        max: 42

  - h2: Date and Time Inputs

  - input:
      type: date
      name: date
      label: Date
      hint: What's your birthday?

  - input:
      type: datetime-local
      name: datetime-local
      label: Datetime Local
      hint: What time is it specifically?

  - input:
      type: month
      name: month
      label: Month
      hint: There's only twelve.

  - input:
      type: time
      name: time
      label: Time
      hint: What time is it?

  - input:
      type: week
      name: week
      label: Week
      hint: There's fifty-two every year.

  - h2: File Input
  - file:
      name: file
      label: File
      hint: Upload a file
      rules:
        size: 1_000_000
        ext:
          - jpg
          - jpeg
          - png
          - gif

  - h2: Multi Inputs

  - select:
      name: select
      label: Select
      hint: Pick an option.
      placeholder: Pick one
      options:
        - text: The Phantom Menace
          value: ep1
        - text: Attack of the Clones
          value: ep2
        - text: Revenge of the Sith
          value: ep3
        - text: A New Hope
          value: ep4
        - text: The Empire Strikes Back
          value: ep5
        - text: Return of the Jedi
          value: ep6
        - text: The Force Awakens
          value: ep7
        - text: The Last Jedi
          value: ep8
        - text: The Rise of Skywalker
          value: ep9
      rules:
        oneOf:
          - ep4
          - ep5
          - ep6

  - combobox:
      name: combobox
      label: Combobox
      hint: Search for something
      placeholder: Star Wars...
      options:
        - The Phantom Menace
        - Attack of the Clones
        - Revenge of the Sith
        - A New Hope
        - The Empire Strikes Back
        - Return of the Jedi
        - The Force Awakens
        - The Last Jedi
        - The Rise of Skywalker
      rules:
        oneOf:
          - A New Hope
          - The Empire Strikes Back
          - Return of the Jedi

  - h2: Boolean Inputs

  - checkbox:
      name: checkbox
      label: Checkbox
      checked: false
      rules:
        matches: checkbox

  - checkbox:
      name: checkboxOptions
      label: Checkbox with options
      options:
        - Salt
        - Pepper
        - Vinegar
      rules:
        length: 2

  - radio:
      name: radio
      label: Radio
      options:
        - Red pill
        - Blue pill
      rules:
        matches: Red pill

  - h2: Range Input
  - range:
      name: range
      label: Range
      hint: Slide it up or down.
      min: 0
      max: 100
      value: 50
      rules:
        min: 20
        max: 80

  - h2: Long Text Inputs
  - textarea:
      name: content
      label: Content
      hint: Give a hint.
      placeholder: What do you have to say?
      rules:
        min: 20
        max: 50
        matches: '[Tt]he [Ff]rench'

  - button:
      label: Submit!
      type: submit
