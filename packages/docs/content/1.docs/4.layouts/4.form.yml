title: Form
layout: form
action: /docs/layouts/form
method: GET
body:
  - input:
      type: text
      name: fields[name]
      label: Name
      hint: You know this.
      placeholder: What do people call you?

  - input:
      type: text
      name: fields[validations]
      label: Validations
      hint: This field is required; it must be between 6 and 15 characters long and contain the word 'banana'.
      placeholder: I am a banana!
      validate:
        min: 6
        max: 15
        matches: banana
        required: true

  - input:
      type: email
      name: fields[email]
      label: Email
      hint: How do we contact you?
      placeholder: john@example.com

  - input:
      type: password
      name: fields[password]
      label: Password
      hint: Keep it secret.
      placeholder: correct horse battery staple
      validate:
        min: 6

  - file:
      name: fields[file]
      label: File
      hint: Upload a file

  - select:
      name: fields[select]
      label: Select
      hint: Pick an option.
      placeholder: Pick one
      options:
        - text: The Phantom Menace
          value: ep1
        - text: Attack of the Clones
          value: ep2
        - text: Revenge of the Sith
          value: ep3
        - text: A New Hope
          value: ep4
        - text: The Empire Strikes Back
          value: ep5
        - text: Return of the Jedi
          value: ep6
        - text: The Force Awakens
          value: ep7
        - text: The Last Jedi
          value: ep8
        - text: The Rise of Skywalker
          value: ep9

  - combobox:
      name: fields[combobox]
      label: Combobox
      hint: Search for something
      placeholder: Star Wars...
      options:
        - The Phantom Menace
        - Attack of the Clones
        - Revenge of the Sith
        - A New Hope
        - The Empire Strikes Back
        - Return of the Jedi
        - The Force Awakens
        - The Last Jedi
        - The Rise of Skywalker

  - checkbox:
      name: fields[checkbox]
      label: Checkbox
      checked: false

  - checkbox:
      name: fields[checkboxOptions]
      label: Checkbox with options
      options:
        - Salt
        - Pepper
        - Vinegar

  - radio:
      name: fields[radio]
      label: Radio
      options:
        - Red pill
        - Blue pill

  - range:
      name: fields[range]
      label: Range
      hint: Slide it up or down.
      min: 0
      max: 100
      value: 50

  - textarea:
      name: fields[content]
      label: Content
      hint: Give a hint.
      placeholder: What do you have to say?

  - button:
      label: Submit!
      type: submit
